<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anscombe四重奏数据可视化分析</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .stats-info {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 10px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-card h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .stat-card p {
            margin: 5px 0;
            font-size: 0.9em;
            color: #555;
        }
        
        .stat-card .stat-value {
            font-weight: bold;
            color: #667eea;
        }
        
        .charts-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        
        .grid-2x2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        
        .chart-container {
            background: #fafafa;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
        }
        
        .chart-container:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .chart-title {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #555;
        }
        
        .single-chart {
            margin-top: 30px;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
        }
        
        @media (max-width: 768px) {
            .grid-2x2 {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Anscombe四重奏数据可视化分析</h1>
        <div class="subtitle">四组具有相同统计特性但分布完全不同的数据集</div>
        
        <div class="stats-info">
            <h3 style="margin-bottom: 15px; color: #333;">📈 统计信息对比</h3>
            <div class="stats-grid" id="stats-grid"></div>
        </div>
        
        <div class="charts-section">
            <div class="section-title">🎨 四组数据单独可视化</div>
            <div class="grid-2x2" id="individual-charts"></div>
        </div>
        
        <div class="charts-section">
            <div class="section-title">🌈 所有数据叠加对比</div>
            <div class="single-chart" id="combined-chart"></div>
        </div>
    </div>
    
    <script>
        // Anscombe四重奏数据
        const anscombeData = {
            'I': {
                x: [10, 8, 13, 9, 11, 14, 6, 4, 12, 7, 5],
                y: [8.04, 6.95, 7.58, 8.81, 8.33, 9.96, 7.24, 4.26, 10.84, 4.82, 5.68]
            },
            'II': {
                x: [10, 8, 13, 9, 11, 14, 6, 4, 12, 7, 5],
                y: [9.14, 8.14, 8.74, 8.77, 9.26, 8.10, 6.13, 3.10, 9.13, 7.26, 4.74]
            },
            'III': {
                x: [10, 8, 13, 9, 11, 14, 6, 4, 12, 7, 5],
                y: [7.46, 6.77, 12.74, 7.11, 7.81, 8.84, 6.08, 5.39, 8.15, 6.42, 5.73]
            },
            'IV': {
                x: [8, 8, 8, 8, 8, 8, 8, 19, 8, 8, 8],
                y: [6.58, 5.76, 7.71, 8.84, 8.47, 7.04, 5.25, 12.50, 5.56, 7.91, 6.89]
            }
        };
        
        // 配色方案
        const colors = {
            'I': '#FF6B6B',
            'II': '#4ECDC4',
            'III': '#45B7D1',
            'IV': '#96CEB4'
        };
        
        const markers = ['●', '■', '▲', '◆'];
        
        // 计算统计信息
        function calculateStats(x, y) {
            const meanX = x.reduce((a, b) => a + b, 0) / x.length;
            const meanY = y.reduce((a, b) => a + b, 0) / y.length;
            const varX = x.reduce((a, b) => a + Math.pow(b - meanX, 2), 0) / x.length;
            const varY = y.reduce((a, b) => a + Math.pow(b - meanY, 2), 0) / y.length;
            
            // 相关系数
            const covariance = x.reduce((sum, xi, i) => sum + (xi - meanX) * (y[i] - meanY), 0) / x.length;
            const correlation = covariance / (Math.sqrt(varX) * Math.sqrt(varY));
            
            // 线性回归
            const slope = covariance / varX;
            const intercept = meanY - slope * meanX;
            
            return { meanX, meanY, varX, varY, correlation, slope, intercept };
        }
        
        // 显示统计信息
        function displayStats() {
            const statsGrid = document.getElementById('stats-grid');
            statsGrid.innerHTML = '';
            
            for (const [group, data] of Object.entries(anscombeData)) {
                const stats = calculateStats(data.x, data.y);
                const card = document.createElement('div');
                card.className = 'stat-card';
                card.innerHTML = `
                    <h4>数据集 ${group}</h4>
                    <p>X̄ = <span class="stat-value">${stats.meanX.toFixed(3)}</span> | Ȳ = <span class="stat-value">${stats.meanY.toFixed(3)}</span></p>
                    <p>σ²ₓ = <span class="stat-value">${stats.varX.toFixed(3)}</span> | σ²ᵧ = <span class="stat-value">${stats.varY.toFixed(3)}</span></p>
                    <p>r = <span class="stat-value">${stats.correlation.toFixed(3)}</span></p>
                    <p>y = <span class="stat-value">${stats.slope.toFixed(3)}</span>x + <span class="stat-value">${stats.intercept.toFixed(3)}</span></p>
                `;
                statsGrid.appendChild(card);
            }
        }
        
        // 创建散点图
        function createScatterPlot(containerId, data, group, width = 400, height = 400) {
            const margin = { top: 40, right: 30, bottom: 50, left: 50 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;
            
            // 清除现有内容
            d3.select(`#${containerId}`).selectAll("*").remove();
            
            // 创建SVG
            const svg = d3.select(`#${containerId}`)
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);
            
            // 计算范围
            const xExtent = d3.extent([...data.x, ...(group === 'IV' ? [19] : [])]);
            const yExtent = d3.extent([...data.y, ...(group === 'IV' ? [12.5] : [])]);
            
            // 创建比例尺
            const xScale = d3.scaleLinear()
                .domain([Math.min(2, xExtent[0] - 1), Math.max(20, xExtent[1] + 1)])
                .range([0, innerWidth]);
            
            const yScale = d3.scaleLinear()
                .domain([Math.min(2, yExtent[0] - 1), Math.max(14, yExtent[1] + 1)])
                .range([innerHeight, 0]);
            
            // 添加网格线
            svg.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(xScale).ticks(10).tickSize(-innerHeight))
                .attr("stroke-opacity", 0.1);
            
            svg.append("g")
                .attr("class", "grid")
                .call(d3.axisLeft(yScale).ticks(10).tickSize(-innerWidth))
                .attr("stroke-opacity", 0.1);
            
            // 添加坐标轴
            svg.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(xScale))
                .style("font-size", "10px");
            
            svg.append("g")
                .call(d3.axisLeft(yScale))
                .style("font-size", "10px");
            
            // 添加轴标签
            svg.append("text")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + 35)
                .attr("text-anchor", "middle")
                .style("font-size", "12px")
                .style("fill", "#666")
                .text("X 值");
            
            svg.append("text")
                .attr("x", -innerHeight / 2)
                .attr("y", -35)
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .style("font-size", "12px")
                .style("fill", "#666")
                .text("Y 值");
            
            // 计算回归线
            const stats = calculateStats(data.x, data.y);
            const xLine = [xScale.domain()[0], xScale.domain()[1]];
            const yLine = xLine.map(x => stats.slope * x + stats.intercept);
            
            // 绘制回归线
            svg.append("line")
                .attr("x1", xScale(xLine[0]))
                .attr("y1", yScale(yLine[0]))
                .attr("x2", xScale(xLine[1]))
                .attr("y2", yScale(yLine[1]))
                .attr("stroke", "#2C3E50")
                .attr("stroke-width", 2)
                .attr("stroke-dasharray", "5,5")
                .attr("opacity", 0.7);
            
            // 添加图例
            svg.append("text")
                .attr("x", innerWidth - 10)
                .attr("y", -10)
                .attr("text-anchor", "end")
                .style("font-size", "10px")
                .style("fill", "#2C3E50")
                .text(`回归线: y = ${stats.slope.toFixed(2)}x + ${stats.intercept.toFixed(2)}`);
            
            // 添加工具提示
            const tooltip = d3.select("body").append("div")
                .attr("class", "tooltip")
                .style("opacity", 0);
            
            // 绘制散点
            svg.selectAll("circle")
                .data(data.x.map((x, i) => ({ x, y: data.y[i] })))
                .enter()
                .append("circle")
                .attr("cx", d => xScale(d.x))
                .attr("cy", d => yScale(d.y))
                .attr("r", 6)
                .attr("fill", colors[group])
                .attr("stroke", "white")
                .attr("stroke-width", 2)
                .attr("opacity", 0.7)
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", 8).attr("opacity", 1);
                    tooltip.transition().duration(200).style("opacity", 0.9);
                    tooltip.html(`X: ${d.x}<br/>Y: ${d.y}`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("r", 6).attr("opacity", 0.7);
                    tooltip.transition().duration(500).style("opacity", 0);
                });
        }
        
        // 创建组合图
        function createCombinedChart() {
            const containerId = "combined-chart";
            const width = 900;
            const height = 600;
            const margin = { top: 60, right: 120, bottom: 60, left: 60 };
            const innerWidth = width - margin.left - margin.right;
            const innerHeight = height - margin.top - margin.bottom;
            
            d3.select(`#${containerId}`).selectAll("*").remove();
            
            const svg = d3.select(`#${containerId}`)
                .append("svg")
                .attr("width", width)
                .attr("height", height)
                .append("g")
                .attr("transform", `translate(${margin.left},${margin.top})`);
            
            // 收集所有数据点
            const allPoints = [];
            for (const [group, data] of Object.entries(anscombeData)) {
                data.x.forEach((x, i) => {
                    allPoints.push({ group, x, y: data.y[i] });
                });
            }
            
            const xScale = d3.scaleLinear()
                .domain([2, 20])
                .range([0, innerWidth]);
            
            const yScale = d3.scaleLinear()
                .domain([2, 14])
                .range([innerHeight, 0]);
            
            // 网格线
            svg.append("g")
                .attr("class", "grid")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(xScale).ticks(10).tickSize(-innerHeight))
                .attr("stroke-opacity", 0.1);
            
            svg.append("g")
                .attr("class", "grid")
                .call(d3.axisLeft(yScale).ticks(10).tickSize(-innerWidth))
                .attr("stroke-opacity", 0.1);
            
            // 坐标轴
            svg.append("g")
                .attr("transform", `translate(0,${innerHeight})`)
                .call(d3.axisBottom(xScale))
                .style("font-size", "11px");
            
            svg.append("g")
                .call(d3.axisLeft(yScale))
                .style("font-size", "11px");
            
            // 轴标签
            svg.append("text")
                .attr("x", innerWidth / 2)
                .attr("y", innerHeight + 40)
                .attr("text-anchor", "middle")
                .style("font-size", "13px")
                .style("fill", "#666")
                .style("font-weight", "bold")
                .text("X 值");
            
            svg.append("text")
                .attr("x", -innerHeight / 2)
                .attr("y", -40)
                .attr("text-anchor", "middle")
                .attr("transform", "rotate(-90)")
                .style("font-size", "13px")
                .style("fill", "#666")
                .style("font-weight", "bold")
                .text("Y 值");
            
            // 为每组数据绘制回归线
            for (const [group, data] of Object.entries(anscombeData)) {
                const stats = calculateStats(data.x, data.y);
                const xLine = [2, 20];
                const yLine = xLine.map(x => stats.slope * x + stats.intercept);
                
                svg.append("line")
                    .attr("x1", xScale(xLine[0]))
                    .attr("y1", yScale(yLine[0]))
                    .attr("x2", xScale(xLine[1]))
                    .attr("y2", yScale(yLine[1]))
                    .attr("stroke", colors[group])
                    .attr("stroke-width", 2)
                    .attr("stroke-dasharray", "5,5")
                    .attr("opacity", 0.5);
            }
            
            // 工具提示
            const tooltip = d3.select("body").append("div")
                .attr("class", "tooltip")
                .style("opacity", 0);
            
            // 绘制所有散点
            svg.selectAll("circle")
                .data(allPoints)
                .enter()
                .append("circle")
                .attr("cx", d => xScale(d.x))
                .attr("cy", d => yScale(d.y))
                .attr("r", 7)
                .attr("fill", d => colors[d.group])
                .attr("stroke", "white")
                .attr("stroke-width", 2)
                .attr("opacity", 0.7)
                .attr("cursor", "pointer")
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("r", 10).attr("opacity", 1);
                    tooltip.transition().duration(200).style("opacity", 0.9);
                    tooltip.html(`数据集 ${d.group}<br/>X: ${d.x}<br/>Y: ${d.y}`)
                        .style("left", (event.pageX + 10) + "px")
                        .style("top", (event.pageY - 28) + "px");
                })
                .on("mouseout", function() {
                    d3.select(this).attr("r", 7).attr("opacity", 0.7);
                    tooltip.transition().duration(500).style("opacity", 0);
                });
            
            // 添加图例
            const legend = svg.append("g")
                .attr("transform", `translate(${innerWidth + 10}, 0)`);
            
            Object.entries(anscombeData).forEach(([group, data], i) => {
                const legendY = i * 25;
                legend.append("circle")
                    .attr("cx", 0)
                    .attr("cy", legendY)
                    .attr("r", 6)
                    .attr("fill", colors[group])
                    .attr("stroke", "white")
                    .attr("stroke-width", 2);
                
                legend.append("text")
                    .attr("x", 12)
                    .attr("y", legendY + 4)
                    .style("font-size", "11px")
                    .style("fill", "#666")
                    .text(`数据集 ${group}`);
            });
            
            // 添加标题
            svg.append("text")
                .attr("x", innerWidth / 2)
                .attr("y", -25)
                .attr("text-anchor", "middle")
                .style("font-size", "14px")
                .style("font-weight", "bold")
                .style("fill", "#333")
                .text("📊 四组数据叠加对比 - 不同颜色代表不同数据集");
        }
        
        // 渲染所有图表
        function renderCharts() {
            // 创建四个单独的散点图
            for (const [group, data] of Object.entries(anscombeData)) {
                const containerId = `chart-${group}`;
                const container = document.getElementById(containerId);
                if (container) {
                    createScatterPlot(containerId, data, group, 400, 400);
                }
            }
            
            // 创建组合图
            createCombinedChart();
        }
        
        // 初始化页面
        function init() {
            displayStats();
            
            // 创建四个图表的容器
            const individualContainer = document.getElementById('individual-charts');
            for (const group of ['I', 'II', 'III', 'IV']) {
                const chartDiv = document.createElement('div');
                chartDiv.className = 'chart-container';
                chartDiv.innerHTML = `
                    <div class="chart-title">📈 数据集 ${group}</div>
                    <div id="chart-${group}" style="min-height: 400px;"></div>
                `;
                individualContainer.appendChild(chartDiv);
            }
            
            renderCharts();
        }
        
        // 页面加载完成后执行
        window.addEventListener('load', init);
        
        // 响应窗口大小变化
        window.addEventListener('resize', () => {
            renderCharts();
        });
    </script>
</body>
</html>
