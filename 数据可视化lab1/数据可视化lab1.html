<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奥运奖牌榜 - 可视化大屏</title>
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <!-- 引入 PapaParse 用于解析 CSV -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --input-bg: #334155;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }
        header {
            text-align: center;
            padding: 20px 0 30px;
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.1) 0%, rgba(15, 23, 42, 0) 100%);
        }
        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }
        .sub-title {
            color: var(--text-dim);
            margin-top: 10px;
            font-size: 1rem;
        }
        
        /* 搜索栏样式 */
        .search-container {
            max-width: 600px;
            margin: 20px auto 40px;
            position: relative;
            display: flex;
            gap: 10px;
        }
        .search-input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 20px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background: #3d4b5f;
        }
        .search-input::placeholder {
            color: var(--text-dim);
        }
        .search-btn {
            background: var(--accent);
            color: var(--bg-color);
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .search-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-auto-rows: minmax(450px, auto);
            gap: 24px;
            max-width: 1800px;
            margin: 0 auto;
        }
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            border-color: rgba(56, 189, 248, 0.3);
        }
        .card h3 {
            margin: 0 0 20px 0;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent);
            display: flex;
            align-items: center;
        }
        .card h3::before {
            content: '';
            width: 4px;
            height: 18px;
            background: var(--accent);
            margin-right: 12px;
            border-radius: 2px;
        }
        /* 布局控制 */
        .col-12 { grid-column: span 12; }
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }
        .col-6 { grid-column: span 6; }

        .chart-container {
            width: 100%;
            height: calc(100% - 40px);
            min-height: 380px;
        }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-result {
            grid-column: span 12;
            text-align: center;
            padding: 100px;
            color: var(--text-dim);
            font-size: 1.2rem;
            background: var(--card-bg);
            border-radius: 16px;
        }

        /* Tooltip 国旗样式 */
        .tooltip-flag {
            width: 24px;
            height: 16px;
            margin-right: 8px;
            vertical-align: middle;
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        @media (max-width: 1200px) {
            .col-8, .col-4 { grid-column: span 12; }
        }
        @media (max-width: 768px) {
            .col-6 { grid-column: span 12; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div id="loader" class="loading-overlay">
        <div class="spinner"></div>
        <p style="margin-top: 20px; color: var(--text-dim);">正在同步全球奖牌数据...</p>
    </div>

    <div class="container">
        <header>
            <h1>奥运奖牌榜实时数据大屏</h1>
            <div class="sub-title">Olympic Medals Insights Dashboard</div>
            
            <div class="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="输入国家名称进行搜索分析...">
                <button id="search-btn" class="search-btn">搜索</button>
            </div>
        </header>

        <div class="dashboard" id="dashboard" style="visibility: hidden;">
            <div id="no-result-msg" class="no-result" style="display: none;">未找到相关国家数据</div>
            
            <!-- 第一行：详细分布 (全宽) -->
            <div class="card col-12 chart-card">
                <h3 id="main-chart-title">各国奖牌详细分布 (TOP 20)</h3>
                <div id="main-chart" class="chart-container"></div>
            </div>

            <!-- 第二行：占比分析 -->
            <div class="card col-8 chart-card">
                <h3>金牌总数趋势分析</h3>
                <div id="line-chart" class="chart-container"></div>
            </div>
            <div class="card col-4 chart-card">
                <h3>总奖牌贡献占比</h3>
                <div id="pie-chart" class="chart-container"></div>
            </div>

            <!-- 第三行：金牌对比 -->
            <div class="card col-12 chart-card">
                <h3>金银铜奖牌构成对比</h3>
                <div id="total-chart" class="chart-container"></div>
            </div>
        </div>
    </div>

    <script>
        const THEME_COLORS = ['#38bdf8', '#818cf8', '#fb7185', '#fbbf24', '#34d399', '#a78bfa', '#f472b6'];
        let rawData = [];
        let charts = [];
        
        document.addEventListener('DOMContentLoaded', function() {
            fetch('medals_countries.csv')
                .then(response => response.text())
                .then(csvData => {
                    Papa.parse(csvData, {
                        header: true,
                        dynamicTyping: true,
                        skipEmptyLines: true,
                        complete: function(results) {
                            rawData = results.data.filter(row => row['国家']);
                            setTimeout(() => {
                                renderCharts(rawData);
                                document.getElementById('loader').style.opacity = '0';
                                setTimeout(() => {
                                    document.getElementById('loader').style.display = 'none';
                                    document.getElementById('dashboard').style.visibility = 'visible';
                                }, 500);
                            }, 800);
                        }
                    });
                })
                .catch(err => {
                    console.error(err);
                    document.querySelector('.loading-overlay p').innerText = '数据加载失败，请检查 CSV 文件路径。';
                });

            // 搜索功能实现
            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');

            function handleSearch() {
                const keyword = searchInput.value.trim().toLowerCase();
                const filteredData = rawData.filter(item => 
                    item['国家'].toLowerCase().includes(keyword)
                );

                const noResultMsg = document.getElementById('no-result-msg');
                const chartCards = document.querySelectorAll('.chart-card');
                const mainTitle = document.getElementById('main-chart-title');

                if (filteredData.length === 0) {
                    noResultMsg.style.display = 'block';
                    chartCards.forEach(card => card.style.display = 'none');
                } else {
                    noResultMsg.style.display = 'none';
                    chartCards.forEach(card => card.style.display = 'block');
                    mainTitle.innerText = keyword ? `搜索结果: ${filteredData.length} 个国家` : '各国奖牌详细分布 (TOP 20)';
                    renderCharts(filteredData, !!keyword);
                }
            }

            searchBtn.addEventListener('click', handleSearch);
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleSearch();
            });
            let timeout;
            searchInput.addEventListener('input', () => {
                clearTimeout(timeout);
                timeout = setTimeout(handleSearch, 500);
            });

            function getFlagByCountry(countryName) {
                const item = rawData.find(d => d['国家'] === countryName);
                return item ? item['国旗'] : '';
            }

            function renderCharts(data, isFiltered = false) {
                charts.forEach(chart => chart.dispose());
                charts = [];

                const displayData = isFiltered ? data : data.slice(0, 20);
                const top15 = isFiltered ? data : data.slice(0, 15);
                const top10 = isFiltered ? data : data.slice(0, 10);

                // 1. 横向堆叠条形图
                const mainChart = echarts.init(document.getElementById('main-chart'));
                
                // 为 yAxis 配置国旗 Rich Text
                const richConfig = {};
                displayData.forEach((item, index) => {
                    richConfig[`flag${index}`] = {
                        height: 20,
                        align: 'center',
                        backgroundColor: {
                            image: item['国旗']
                        }
                    };
                });

                mainChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' },
                        backgroundColor: 'rgba(30, 41, 59, 0.9)',
                        borderColor: '#38bdf8',
                        textStyle: { color: '#fff' },
                        formatter: function(params) {
                            const country = params[0].name;
                            const flag = getFlagByCountry(country);
                            let res = `<div><img src="${flag}" class="tooltip-flag"><b>${country}</b></div>`;
                            params.forEach(item => {
                                res += `<div style="margin-top:5px">${item.marker} ${item.seriesName}: ${item.value}</div>`;
                            });
                            return res;
                        }
                    },
                    legend: {
                        data: ['金牌', '银牌', '铜牌'],
                        textStyle: { color: '#94a3b8' },
                        top: 0
                    },
                    grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
                    xAxis: {
                        type: 'value',
                        splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
                        axisLabel: { color: '#94a3b8' }
                    },
                    yAxis: {
                        type: 'category',
                        data: displayData.map(item => item['国家']).reverse(),
                        axisLabel: { 
                            color: '#f8fafc', 
                            fontSize: 13,
                            formatter: function(value, index) {
                                // 这里的 index 是反向的，需要对应到 displayData
                                const realIndex = displayData.length - 1 - index;
                                return `{flag${realIndex}|}  ${value}`;
                            },
                            rich: richConfig
                        },
                        axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                    },
                    series: [
                        {
                            name: '金牌',
                            type: 'bar',
                            stack: 'total',
                            emphasis: { focus: 'series' },
                            data: displayData.map(item => item['金牌']).reverse(),
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                                    { offset: 0, color: '#fbbf24' },
                                    { offset: 1, color: '#d97706' }
                                ]),
                                borderRadius: [0, 4, 4, 0]
                            }
                        },
                        {
                            name: '银牌',
                            type: 'bar',
                            stack: 'total',
                            emphasis: { focus: 'series' },
                            data: displayData.map(item => item['银牌']).reverse(),
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                                    { offset: 0, color: '#e2e8f0' },
                                    { offset: 1, color: '#94a3b8' }
                                ])
                            }
                        },
                        {
                            name: '铜牌',
                            type: 'bar',
                            stack: 'total',
                            emphasis: { focus: 'series' },
                            data: displayData.map(item => item['铜牌']).reverse(),
                            itemStyle: { 
                                color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                                    { offset: 0, color: '#b45309' },
                                    { offset: 1, color: '#78350f' }
                                ])
                            }
                        }
                    ],
                    animationDuration: 1500
                });

                // 2. 饼图
                const pieChart = echarts.init(document.getElementById('pie-chart'));
                pieChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { 
                        trigger: 'item', 
                        formatter: function(params) {
                            const flag = getFlagByCountry(params.name);
                            return `<div><img src="${flag}" class="tooltip-flag"><b>${params.name}</b></div>
                                    <div style="margin-top:5px">${params.seriesName}: ${params.value} (${params.percent}%)</div>`;
                        }
                    },
                    series: [{
                        name: '总奖牌数',
                        type: 'pie',
                        radius: ['30%', '70%'],
                        center: ['50%', '50%'],
                        roseType: 'area',
                        itemStyle: { borderRadius: 8 },
                        data: top10.map((item, idx) => ({
                            name: item['国家'],
                            value: item['总数'],
                            itemStyle: { color: THEME_COLORS[idx % THEME_COLORS.length] }
                        })),
                        label: { color: '#94a3b8' },
                        emphasis: {
                            label: { show: true, fontSize: '14', fontWeight: 'bold' }
                        }
                    }]
                });

                // 3. 折线图
                const lineChart = echarts.init(document.getElementById('line-chart'));
                lineChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { 
                        trigger: 'axis',
                        formatter: function(params) {
                            const country = params[0].name;
                            const flag = getFlagByCountry(country);
                            return `<div><img src="${flag}" class="tooltip-flag"><b>${country}</b></div>
                                    <div style="margin-top:5px">金牌数: ${params[0].value}</div>`;
                        }
                    },
                    xAxis: {
                        type: 'category',
                        data: top15.map(item => item['国家']),
                        axisLabel: { color: '#94a3b8', rotate: isFiltered ? 45 : 35 },
                        axisLine: { lineStyle: { color: 'rgba(255,255,255,0.1)' } }
                    },
                    yAxis: {
                        type: 'value',
                        splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } },
                        axisLabel: { color: '#94a3b8' }
                    },
                    series: [{
                        data: top15.map(item => item['金牌']),
                        type: 'line',
                        smooth: true,
                        symbol: 'circle',
                        symbolSize: 8,
                        itemStyle: { color: '#38bdf8' },
                        lineStyle: { width: 4, color: '#38bdf8' },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(56, 189, 248, 0.3)' },
                                { offset: 1, color: 'rgba(56, 189, 248, 0)' }
                            ])
                        }
                    }]
                });

                // 4. 柱状图对比
                const totalChart = echarts.init(document.getElementById('total-chart'));
                totalChart.setOption({
                    backgroundColor: 'transparent',
                    tooltip: { 
                        trigger: 'axis',
                        formatter: function(params) {
                            const country = params[0].name;
                            const flag = getFlagByCountry(country);
                            let res = `<div><img src="${flag}" class="tooltip-flag"><b>${country}</b></div>`;
                            params.forEach(item => {
                                res += `<div style="margin-top:5px">${item.marker} ${item.seriesName}: ${item.value}</div>`;
                            });
                            return res;
                        }
                    },
                    legend: { data: ['金牌', '银牌', '铜牌'], textStyle: { color: '#94a3b8' } },
                    xAxis: {
                        type: 'category',
                        data: top15.map(item => item['国家']),
                        axisLabel: { color: '#94a3b8', rotate: isFiltered ? 45 : 35 }
                    },
                    yAxis: {
                        type: 'value',
                        splitLine: { lineStyle: { color: 'rgba(255,255,255,0.05)' } }
                    },
                    series: [
                        { name: '金牌', type: 'bar', data: top15.map(item => item['金牌']), itemStyle: { color: '#fbbf24' } },
                        { name: '银牌', type: 'bar', data: top15.map(item => item['银牌']), itemStyle: { color: '#cbd5e1' } },
                        { name: '铜牌', type: 'bar', data: top15.map(item => item['铜牌']), itemStyle: { color: '#a8a29e' } }
                    ]
                });

                charts.push(mainChart, pieChart, lineChart, totalChart);
            }

            window.addEventListener('resize', () => {
                charts.forEach(chart => chart.resize());
            });
        });
    </script>
</body>
</html>
